name: Send Reminders

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminder cron
        run: |
          curl -s -L -X GET "${{ secrets.APP_URL }}/api/cron/reminders" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
